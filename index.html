<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mauro & Maca - Boda 2026</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Grand+Hotel&display=swap"
        rel="stylesheet">
    <!-- Google Visualization API para leer el Sheet sin problemas de CORS en servidores -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --accent-color: #f7d794;
            /* Color champaña/oro suave */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #instagram-header {
            position: fixed;
            top: 25px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 500;
            pointer-events: none;
            animation: fadeInHeader 1.5s ease-out forwards;
        }

        #insta-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
        }

        #insta-text {
            font-family: 'Grand Hotel', cursive;
            font-size: 3.2rem;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        @keyframes fadeInHeader {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
        }

        #slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .bg-blur {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            z-index: -1;
        }

        .photo {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .caption-container {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            min-width: 300px;
            max-width: 80%;
            padding: 25px 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 100px;
            /* Estilo cápsula moderna */
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .caption-text {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            /* Todo el texto dorado */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            /* Mejora de legibilidad */
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .caption-container {
                padding: 15px 30px;
                min-width: 250px;
                bottom: 4%;
            }

            .caption-text {
                font-size: 1.4rem;
            }
        }

        .hashtag {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* UI Controls */
        #ui-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        body:hover #ui-overlay {
            opacity: 1;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-family: 'Outfit';
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* No cursor when idle */
        body.idle {
            cursor: none;
        }

        body.idle #ui-overlay {
            opacity: 0;
        }

        /* QR Fijo abajo a la izquierda */
        #qr-fixed-container {
            position: fixed;
            bottom: 25px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 500;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInHeader 1.5s ease-out forwards;
        }

        #qr-fixed-image {
            width: 90px;
            height: 90px;
            background: white;
            padding: 5px;
            border-radius: 12px;
            object-fit: contain;
        }

        .qr-fixed-text-container {
            display: flex;
            flex-direction: column;
        }

        .qr-fixed-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 2px;
        }

        .qr-fixed-subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        /* Contador de Fotos */
        #photo-counter {
            position: fixed;
            bottom: 20px;
            right: 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 20px;
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: 300;
            border: 1px solid var(--glass-border);
            z-index: 100;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Badge para fotos prioritarias */
        .badge-live {
            position: absolute;
            top: 100px;
            right: 40px;
            background: #ff0050;
            /* Color Instagram vivo */
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
            animation: pulseLive 2s infinite;
        }

        @keyframes pulseLive {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; font-weight: 300;">CONECTANDO CON TUS RECUERDOS...</p>
    </div>

    <div id="instagram-header">
        <img id="insta-logo" src="https://drive.google.com/thumbnail?id=1w-Srp_t0i9JZs4X0IvGwOuRav8eN8L5q&sz=w500"
            alt="M&M Logo">
        <span id="insta-text">M&Mgram</span>
    </div>

    <div id="ui-overlay">
        <button class="btn" onclick="toggleFullScreen()">Pantalla Completa</button>
    </div>

    <div id="qr-fixed-container">
        <img id="qr-fixed-image" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://forms.gle/NfUjYEk56XdyXpv86" alt="QR Link">
        <div class="qr-fixed-text-container">
            <span class="qr-fixed-title">¡Subí tu Foto!</span>
            <span class="qr-fixed-subtitle">Escaneá y compartí</span>
        </div>
    </div>

    <div id="photo-counter">0 / 0</div>

    <div id="slideshow-container"></div>

    <script>
        const SPREADSHEET_ID = '1jAAaPXs6xcuMKmZetWeWEe5WGIdlrVNM7Pf9PcPcsoA';
        const GID = '306335753';
        const SLIDE_DURATION = 5000;
        const QR_IMAGE_URL = 'https://api.qrserver.com/v1/create-qr-code/?size=450x450&data=https://forms.gle/NfUjYEk56XdyXpv86';

        let photos = [];
        let priorityQueue = [];
        let seenPhotoUrls = new Set();
        let isLoaded = false;
        let slideshowInterval = null;
        let priorityShownCount = 0;

        // Cargar Google Visualization API
        google.charts.load('current', { packages: ['corechart'] });
        google.charts.setOnLoadCallback(init);

        function init() {
            fetchData();
            // Refrescar datos cada 30 segundos
            setInterval(fetchData, 30000);
        }

        function fetchData() {
            const query = new google.visualization.Query(
                `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?gid=${GID}`
            );
            query.send(handleQueryResponse);
        }

        function handleQueryResponse(response) {
            if (response.isError()) {
                console.error('Error en la consulta: ' + response.getMessage() + ' ' + response.getDetailedMessage());
                return;
            }

            const data = response.getDataTable();
            const numRows = data.getNumberOfRows();
            const numCols = data.getNumberOfColumns();
            console.log(`Datos recibidos: ${numRows} filas, ${numCols} columnas`);

            const incomingPhotos = [];

            // Iterar por las filas (columna 2: Caption, columna 3: URL)
            for (let i = 0; i < numRows; i++) {
                const photoUrl = data.getValue(i, 3);
                const captionText = data.getValue(i, 2);
                console.log(`Fila ${i}: URL=${photoUrl}, Caption=${captionText}`);
                
                if (photoUrl && String(photoUrl).includes('http')) {
                    incomingPhotos.push({
                        url: photoUrl,
                        caption: captionText || ''
                    });
                }
            }

            console.log(`Fotos válidas encontradas: ${incomingPhotos.length}`);

            // Lógica de detección de fotos nuevas (VIP)
            incomingPhotos.forEach(p => {
                if (!seenPhotoUrls.has(p.url)) {
                    seenPhotoUrls.add(p.url);
                    if (isLoaded) {
                        priorityQueue.push(p);
                        console.log("¡Nueva foto detectada para prioridad!", p.url);
                    }
                }
            });

            // Siempre actualizamos la lista general
            photos = incomingPhotos;

            if (!isLoaded && photos.length > 0) {
                isLoaded = true;
                hideLoading();
                startSlideshow();
            }
        }


        function startSlideshow() {
            showNext();
            slideshowInterval = setInterval(showNext, SLIDE_DURATION);
        }

        function showNext() {
            if (photos.length === 0) return;

            let item;
            let isPriority = false;

            // REGLA DE INTERCALADO: Si hay fotos por subir y no mostramos demasiadas seguidas (max 3)
            if (priorityQueue.length > 0 && priorityShownCount < 3) {
                item = priorityQueue.shift();
                isPriority = true;
                priorityShownCount++;
                console.log("Mostrando foto PRIORITARIA. VIP items restates:", priorityQueue.length);
            } else {
                // Rotación normal
                currentIndex = (currentIndex + 1) % photos.length;
                item = photos[currentIndex];
                priorityShownCount = 0;
            }

            // Actualizar contador
            const counter = document.getElementById('photo-counter');
            if (counter) {
                const totalText = isPriority ? `${photos.length} (+ NUEVA)` : `${currentIndex + 1} / ${photos.length}`;
                counter.innerText = totalText;
            }

            const container = document.getElementById('slideshow-container');
            const slide = document.createElement('div');
            slide.className = 'slide';

            const formattedCaption = item.caption.replace(/#([^\s,]+)/g, '<span class="hashtag">#$1</span>');
            const liveBadge = isPriority ? '<div class="badge-live">¡Recién subida!</div>' : '';

            slide.innerHTML = `
                <div class="bg-blur" style="background-image: url('${item.url}')"></div>
                ${liveBadge}
                <img src="${item.url}" class="photo" onerror="this.parentElement.style.display='none'">
                <div class="caption-container">
                    <p class="caption-text">${formattedCaption}</p>
                </div>
            `;

            container.appendChild(slide);
            setTimeout(() => slide.classList.add('active'), 100);

            // Limpieza agresiva de slides viejos (solo dejamos el nuevo)
            const slides = container.querySelectorAll('.slide');
            slides.forEach(s => {
                if (s !== slide) {
                    s.classList.remove('active');
                    setTimeout(() => { if (s.parentNode) s.remove(); }, 2500);
                }
            });
        }

        function hideLoading() {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 1000);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Gestión de cursor idle
        let idleTimer;
        document.body.addEventListener('mousemove', () => {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => document.body.classList.add('idle'), 3000);
        });
    </script>
</body>

</html>
